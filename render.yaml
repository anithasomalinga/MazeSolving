services:
  - type: web
    name: maze-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma migrate deploy
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: maze-db
          property: connectionString

databases:
  - name: maze-db
    plan: free