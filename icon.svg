<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Maze outer border (gap at top-left entrance, bottom-right exit) -->
  <!-- Top wall: leave gap for S entrance -->
  <line x1="164" y1="72" x2="440" y2="72"  stroke="rgba(255,255,255,0.88)" stroke-width="22" stroke-linecap="square"/>
  <!-- Bottom wall: leave gap for F exit -->
  <line x1="72"  y1="440" x2="348" y2="440" stroke="rgba(255,255,255,0.88)" stroke-width="22" stroke-linecap="square"/>
  <!-- Left wall: full -->
  <line x1="72"  y1="72"  x2="72"  y2="440" stroke="rgba(255,255,255,0.88)" stroke-width="22" stroke-linecap="square"/>
  <!-- Right wall: full -->
  <line x1="440" y1="72"  x2="440" y2="440" stroke="rgba(255,255,255,0.88)" stroke-width="22" stroke-linecap="square"/>

  <!-- Internal horizontal walls -->
  <line x1="72"  y1="164" x2="256" y2="164" stroke="rgba(255,255,255,0.88)" stroke-width="20" stroke-linecap="square"/>
  <line x1="348" y1="164" x2="440" y2="164" stroke="rgba(255,255,255,0.88)" stroke-width="20" stroke-linecap="square"/>
  <line x1="164" y1="256" x2="348" y2="256" stroke="rgba(255,255,255,0.88)" stroke-width="20" stroke-linecap="square"/>
  <line x1="72"  y1="348" x2="164" y2="348" stroke="rgba(255,255,255,0.88)" stroke-width="20" stroke-linecap="square"/>
  <line x1="256" y1="348" x2="440" y2="348" stroke="rgba(255,255,255,0.88)" stroke-width="20" stroke-linecap="square"/>

  <!-- Internal vertical walls -->
  <line x1="164" y1="72"  x2="164" y2="164" stroke="rgba(255,255,255,0.88)" stroke-width="20" stroke-linecap="square"/>
  <line x1="256" y1="164" x2="256" y2="256" stroke="rgba(255,255,255,0.88)" stroke-width="20" stroke-linecap="square"/>
  <line x1="348" y1="72"  x2="348" y2="164" stroke="rgba(255,255,255,0.88)" stroke-width="20" stroke-linecap="square"/>
  <line x1="164" y1="256" x2="164" y2="348" stroke="rgba(255,255,255,0.88)" stroke-width="20" stroke-linecap="square"/>
  <line x1="348" y1="256" x2="348" y2="440" stroke="rgba(255,255,255,0.88)" stroke-width="20" stroke-linecap="square"/>
  <line x1="256" y1="348" x2="256" y2="440" stroke="rgba(255,255,255,0.88)" stroke-width="20" stroke-linecap="square"/>

  <!-- Blue solution path S → F -->
  <polyline
    points="118,118 118,210 210,210 210,302 302,302 302,394 394,394"
    fill="none"
    stroke="rgba(147,197,253,0.90)"
    stroke-width="30"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Start circle (green) -->
  <circle cx="118" cy="118" r="48" fill="#4ade80"/>
  <text x="118" y="134" text-anchor="middle"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900" font-size="50" fill="white">S</text>

  <!-- Finish circle (gold) -->
  <circle cx="394" cy="394" r="48" fill="#fbbf24"/>
  <text x="394" y="410" text-anchor="middle"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900" font-size="50" fill="white">F</text>
</svg>
